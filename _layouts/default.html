<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'nl' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '{{ site.baseurl }}/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  {% include nav.html %}
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>{{ site.title }}</p>
  </footer>
  {% if page.use_filter %}
  <script src="{{ '{{ site.baseurl }}/assets/js/filter.js' | relative_url }}"></script>
  {% endif %}
</body>
</html>
